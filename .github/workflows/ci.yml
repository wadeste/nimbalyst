name: CI
run-name: "CI #${{ github.run_number }}: ${{ github.event.head_commit.message }}"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Make npm resilient to transient registry socket drops (ECONNRESET) on the
  # cache-miss path: retry individual failed requests instead of aborting the
  # whole `npm ci`. (Cache hits skip npm ci and make no registry calls at all.)
  npm_config_fetch_retries: '5'
  npm_config_fetch_retry_mintimeout: '20000'
  npm_config_fetch_retry_maxtimeout: '120000'
  npm_config_fetch_timeout: '300000'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      # node_modules cache short-circuits `npm ci` (~75s -> ~5s) when the lock
      # file is unchanged. We rely on exact-key match (no restore-keys) so we
      # never run with a partially-stale tree -- on miss we just `npm ci`.
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/extensions/*/node_modules
          key: node-modules-${{ runner.os }}-node22-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build extension-sdk
        working-directory: packages/extension-sdk
        run: npm run build

      - name: Check override/dep sync
        run: npm run check:override-sync

      - name: Run unit tests
        run: npm run test:unit -- --run

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/extensions/*/node_modules
          key: node-modules-${{ runner.os }}-node22-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      # Build packages that export types (required before typecheck)
      - name: Build extension-sdk
        working-directory: packages/extension-sdk
        run: npm run build

      - name: Public extension SDK smoke checks
        run: npm run extension-sdk:check-public

      # Cache the runtime build output (~46s vite build). Key includes
      # everything the build reads: runtime sources/config, extension-sdk
      # sources (consumed via workspace), and the root lock file.
      - name: Cache runtime build
        id: cache-runtime-dist
        uses: actions/cache@v4
        with:
          path: packages/runtime/dist
          key: runtime-dist-${{ runner.os }}-node22-${{ hashFiles('packages/runtime/src/**', 'packages/runtime/vite.config.*', 'packages/runtime/package.json', 'packages/runtime/tsconfig*.json', 'packages/extension-sdk/src/**', 'package-lock.json') }}

      - name: Build runtime
        if: steps.cache-runtime-dist.outputs.cache-hit != 'true'
        working-directory: packages/runtime
        run: npm run build

      # Typecheck core packages
      - name: TypeScript check - electron
        working-directory: packages/electron
        run: npx tsc --noEmit

      - name: TypeScript check - runtime
        working-directory: packages/runtime
        run: npx tsc --noEmit

      - name: TypeScript check - extension-sdk
        working-directory: packages/extension-sdk
        run: npx tsc --noEmit

      # Typecheck extensions
      - name: TypeScript check - extensions/pdf-viewer
        working-directory: packages/extensions/pdf-viewer
        run: npx tsc --noEmit

      - name: TypeScript check - extensions/extension-dev-kit
        working-directory: packages/extensions/extension-dev-kit
        run: npx tsc --noEmit

      - name: TypeScript check - extensions/datamodellm
        working-directory: packages/extensions/datamodellm
        run: npx tsc --noEmit

      - name: TypeScript check - extensions/csv-spreadsheet
        working-directory: packages/extensions/csv-spreadsheet
        run: npx tsc --noEmit

  # Cheap Ubuntu smoke that catches transcript bundle breakage from runtime
  # changes without paying the 10x macOS multiplier. The full iOS simulator
  # build still runs in ios-transcript-tests.yml on push to main and on PRs
  # that touch packages/ios/**.
  transcript-bundle:
    name: Transcript Bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/extensions/*/node_modules
          key: node-modules-${{ runner.os }}-node22-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build transcript bundle
        run: npm run ios:build:transcript

      - name: Verify transcript bundle output
        run: |
          if [ ! -f "packages/ios/dist-transcript/transcript.html" ]; then
            echo "Error: transcript.html not found in packages/ios/dist-transcript/"
            exit 1
          fi
          if [ ! -d "packages/ios/dist-transcript/assets" ]; then
            echo "Error: assets folder not found in packages/ios/dist-transcript/"
            exit 1
          fi
          du -sh packages/ios/dist-transcript

  # Note: the collaborative E2E specs in packages/electron/e2e/tracker/
  # (tracker-sync-collab.spec.ts, tracker-content-collab.spec.ts) are not
  # run in CI. They drive a real wrangler-dev TrackerRoom/DocumentRoom
  # from the nimbalyst-collab sibling repo, which is a separate project
  # and is not checked out here. The specs self-skip unless
  # RUN_COLLAB_TESTS=1 is set.
  #
  # To run them locally:
  #   1. Check out nimbalyst-collab as a sibling directory:
  #        git clone <nimbalyst-collab-url> ../nimbalyst-collab
  #        cd ../nimbalyst-collab && npm install
  #   2. From stravu-editor, start the dev server (npm run dev).
  #   3. RUN_COLLAB_TESTS=1 npx playwright test \
  #        e2e/tracker/tracker-sync-collab.spec.ts
  #
  # Override the server location with COLLAB_SERVER_PATH (relative to
  # the public repo root) if your nimbalyst-collab checkout is elsewhere.
