name: iOS Transcript Tests

on:
  push:
    branches: [main]
    paths:
      - 'packages/ios/**'
      - 'packages/runtime/**'
      - '.github/workflows/ios-transcript-tests.yml'
  # macOS minutes bill 10x Ubuntu minutes, so on PRs we only run the full
  # simulator job when iOS itself changes. Runtime changes are covered on
  # PRs by the cheap Ubuntu `transcript-bundle` job in ci.yml, and re-run
  # in full here on push to main.
  pull_request:
    branches: [main]
    paths:
      - 'packages/ios/**'
      - '.github/workflows/ios-transcript-tests.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Make npm resilient to transient registry socket drops (ECONNRESET) on the
  # cache-miss path. On a cache hit npm ci is skipped entirely (see below).
  npm_config_fetch_retries: '5'
  npm_config_fetch_retry_mintimeout: '20000'
  npm_config_fetch_retry_maxtimeout: '120000'
  npm_config_fetch_timeout: '300000'

jobs:
  ios-build-and-test:
    name: iOS Build and Test
    runs-on: macos-15
    defaults:
      run:
        working-directory: packages/ios

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      # node_modules cache short-circuits `npm ci` when the lockfile is
      # unchanged, so the common case makes ZERO registry calls and can't hit a
      # transient network failure. Exact-key match only (no restore-keys) so we
      # never run against a partially-stale tree -- on miss we just `npm ci`.
      # Paths are relative to the repo root (github.workspace), NOT the job's
      # packages/ios working-directory, which only applies to `run:` steps.
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/extensions/*/node_modules
          key: node-modules-ios-${{ runner.os }}-node22-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          cd ../..
          npm ci --ignore-scripts

      - name: Build transcript bundle
        run: npx vite build --config vite.config.transcript.ts

      - name: Verify transcript bundle exists
        run: |
          if [ ! -f "dist-transcript/transcript.html" ]; then
            echo "Error: transcript.html not found in dist-transcript/"
            exit 1
          fi
          if [ ! -d "dist-transcript/assets" ]; then
            echo "Error: assets folder not found in dist-transcript/"
            exit 1
          fi
          echo "Transcript bundle built successfully"
          du -sh dist-transcript
          du -sh dist-transcript/assets

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Copy transcript to iOS Resources
        run: |
          mkdir -p NimbalystApp/Resources/transcript-dist
          cp dist-transcript/transcript.html NimbalystApp/Resources/transcript-dist/
          cp -R dist-transcript/assets NimbalystApp/Resources/transcript-dist/

      - name: Regenerate Xcode project
        run: |
          cd NimbalystApp
          xcodegen generate

      - name: Prepare iOS simulator
        run: |
          set -euo pipefail

          SIMULATOR_INFO=$(python3 - <<'PY'
          import json
          import subprocess

          data = json.loads(
              subprocess.check_output(
                  ["xcrun", "simctl", "list", "-j", "devicetypes", "runtimes", "devices", "available"],
                  text=True,
              )
          )

          runtimes = [runtime for runtime in data["runtimes"] if runtime.get("isAvailable") and runtime.get("platform") == "iOS"]
          if not runtimes:
              raise SystemExit("No available iOS simulator runtimes found")

          def version_key(runtime):
              return tuple(int(part) for part in runtime["version"].split("."))

          runtimes.sort(key=version_key)
          runtime = runtimes[-1]

          preferred_device_types = [
              "com.apple.CoreSimulator.SimDeviceType.iPhone-16",
              "com.apple.CoreSimulator.SimDeviceType.iPhone-16-Pro",
              "com.apple.CoreSimulator.SimDeviceType.iPhone-15",
              "com.apple.CoreSimulator.SimDeviceType.iPhone-15-Pro",
          ]

          device_types = {device_type["identifier"]: device_type for device_type in data["devicetypes"]}
          device_type = next((device_types[identifier] for identifier in preferred_device_types if identifier in device_types), None)
          if device_type is None:
              iphone_device_types = sorted(
                  (device_type for device_type in data["devicetypes"] if device_type.get("productFamily") == "iPhone"),
                  key=lambda device_type: device_type["name"],
              )
              if not iphone_device_types:
                  raise SystemExit("No iPhone simulator device types found")
              device_type = iphone_device_types[0]

          existing_devices = data["devices"].get(runtime["identifier"], [])
          existing_device = next(
              (
                  device
                  for device in existing_devices
                  if device.get("isAvailable") and device.get("deviceTypeIdentifier") == device_type["identifier"]
              ),
              None,
          )

          if existing_device is not None:
              simulator_udid = existing_device["udid"]
          else:
              simulator_udid = subprocess.check_output(
                  [
                      "xcrun",
                      "simctl",
                      "create",
                      "CI iPhone Simulator",
                      device_type["identifier"],
                      runtime["identifier"],
                  ],
                  text=True,
              ).strip()

          print(f"SIMULATOR_UDID={simulator_udid}")
          print(f"SIMULATOR_NAME={device_type['name']}")
          print(f"SIMULATOR_RUNTIME={runtime['name']}")
          PY
          )

          echo "$SIMULATOR_INFO" >> "$GITHUB_ENV"

          SIMULATOR_UDID=$(printf '%s\n' "$SIMULATOR_INFO" | sed -n 's/^SIMULATOR_UDID=//p')
          SIMULATOR_NAME=$(printf '%s\n' "$SIMULATOR_INFO" | sed -n 's/^SIMULATOR_NAME=//p')
          SIMULATOR_RUNTIME=$(printf '%s\n' "$SIMULATOR_INFO" | sed -n 's/^SIMULATOR_RUNTIME=//p')

          echo "Using simulator: $SIMULATOR_NAME on $SIMULATOR_RUNTIME ($SIMULATOR_UDID)"
          xcrun simctl boot "$SIMULATOR_UDID" || true
          xcrun simctl bootstatus "$SIMULATOR_UDID" -b
          echo "IOS_SIMULATOR_DESTINATION=platform=iOS Simulator,id=$SIMULATOR_UDID" >> "$GITHUB_ENV"

      - name: Build NimbalystNative package
        run: |
          cd NimbalystNative
          xcodebuild build \
            -scheme NimbalystNative \
            -destination "$IOS_SIMULATOR_DESTINATION" \
            -skipPackagePluginValidation

      - name: Run NimbalystNative tests
        run: |
          cd NimbalystNative
          xcodebuild test \
            -scheme NimbalystNative \
            -destination "$IOS_SIMULATOR_DESTINATION" \
            -skipPackagePluginValidation \
            -enableCodeCoverage YES

      - name: Build iOS app (simulator)
        run: |
          cd NimbalystApp
          xcodebuild \
            -project NimbalystApp.xcodeproj \
            -scheme NimbalystApp \
            -destination "$IOS_SIMULATOR_DESTINATION" \
            -configuration Debug \
            clean build

      - name: Verify transcript bundle in app
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "NimbalystApp.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Could not find built app"
            exit 1
          fi

          if [ ! -d "$APP_PATH/transcript-dist" ]; then
            echo "Error: transcript-dist not found in app bundle at $APP_PATH"
            echo "Contents of app bundle:"
            ls -la "$APP_PATH"
            exit 1
          fi

          echo "Transcript bundle successfully included in app"
          ls -la "$APP_PATH/transcript-dist"
